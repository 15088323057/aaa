{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>个人中心</h2>

    {% if msg %}
        <div class="success-msg">{{ msg }}</div>
    {% endif %}
    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    <ul class="info-list">
        <li><span class="label">ID：</span>{{ user.id }}</li>
        <li><span class="label">用户名：</span>{{ user.username }}</li>
        <li><span class="label">邮箱：</span>{{ user.email }}</li>
        <li><span class="label">手机：</span>{{ user.phone }}</li>
        <li><span class="label">余额：</span>{{ user.balance }}</li>
    </ul>
</div>

<div class="card">
    <h2>充值</h2>

    <form method="POST" action="/recharge" class="login-form">
        <div class="form-group">
            <label for="amount">充值金额</label>
            <input type="number" id="amount" name="amount" step="0.01" placeholder="请输入充值金额" required>
        </div>
        <button type="submit" class="btn btn-primary">充值</button>
    </form>
</div>

<div class="card">
    <h2>修改密码</h2>
    <form method="POST" action="/change-password" class="login-form" onsubmit="return checkPasswords()">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <label for="old_password">原密码</label>
            <input type="password" id="old_password" name="old_password" placeholder="请输入原密码" required>
        </div>
        <div class="form-group">
            <label for="new_password">新密码</label>
            <input type="password" id="new_password" name="new_password" placeholder="请输入新密码" required>
        </div>
        <div class="form-group">
            <label for="confirm_password">确认新密码</label>
            <input type="password" id="confirm_password" placeholder="请再次输入新密码" required>
        </div>
        <button type="submit" class="btn btn-primary">修改密码</button>
    </form>
</div>

<script>
function checkPasswords() {
    var pwd = document.getElementById("new_password").value;
    var confirm = document.getElementById("confirm_password").value;
    if (pwd !== confirm) {
        alert("两次输入的密码不一致！");
        return false;
    }
    return true;
}
</script>
{% endblock %}
