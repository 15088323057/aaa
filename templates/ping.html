{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>📡 Ping 网络诊断</h2>
    <form method="POST" action="/ping" class="search-form">
        <div class="search-box">
            <input type="text" id="ip" name="ip" placeholder="输入 IP 地址或域名（如 8.8.8.8）" value="{{ request.form.get('ip', '') }}" class="search-input" required>
            <button type="submit" class="btn btn-primary search-btn">Ping</button>
        </div>
    </form>
</div>

{% if output %}
<div class="card">
    <h2>执行结果</h2>
    <div class="terminal">
        <div class="terminal-header">
            <span class="terminal-title">$ ping -c 3 {{ request.form.get('ip', '') }}</span>
        </div>
        <pre class="terminal-output">{{ output }}</pre>
    </div>
</div>
{% endif %}
{% endblock %}
